name: Fetch Google Trends and Post to Blogger

on:
  schedule:
    # Run daily at 6 PM UTC (adjust timezone as needed)
    # For IST (6 PM = 12:30 PM UTC), use: '30 12 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — skip Blogger posting and GitHub Issue creation (safe for branch testing)'
        required: false
        default: 'false'
        type: boolean
      max_keywords:
        description: 'Max missing keywords to enrich (1–10). Default is 5.'
        required: false
        default: '5'
        type: string
      skip_blogger:
        description: 'Skip Blogger posting step (fetch trends + AI enrichment only)'
        required: false
        default: 'false'
        type: boolean

jobs:
  fetch-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Fetch Google Trends
        run: npm run trends

      - name: Filter Keywords and Generate Social Media Posts with GitHub Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run trends-ai

      - name: Print Filtered Keywords
        run: |
          echo "=== Filtered Tamil Song Lyrics Keywords ==="
          cat filtered-keywords.json || echo "No filtered-keywords.json found"

      - name: Print Social Media Posts
        run: |
          echo "=== Generated Social Media Posts ==="
          cat social-media-posts.json || echo "No social-media-posts.json found"

      - name: Setup Blogger Authentication
        if: inputs.dry_run != 'true' && inputs.skip_blogger != 'true'
        env:
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_TOKENS: ${{ secrets.BLOGGER_TOKENS }}
        run: |
          echo "🔐 Setting up Blogger authentication..."
          # Create client secret file
          echo "$BLOGGER_CLIENT_SECRET" > scripts/blogger-client-secret.json
          # Create tokens file
          echo "$BLOGGER_TOKENS" > scripts/.blogger-tokens.json
          echo "✅ Authentication files created"

      - name: Post Social Media Content to Blogger
        if: inputs.dry_run != 'true' && inputs.skip_blogger != 'true'
        env:
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          GCS_PROJECT_ID: ${{ secrets.GCS_PROJECT_ID }}
          GCS_SERVICE_ACCOUNT_KEY: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "📱 Posting social media content to Blogger..."
          npm run post-social-media

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blogger-results
          path: |
            social-media-blogger-results.json
            filtered-keywords.json
            missing-keywords.json
          retention-days: 30

      # ── Stage 2: Enrich missing keywords & request human validation ────────
      - name: Enrich Missing Keywords with AI
        if: success() || (inputs.dry_run == 'true') || (inputs.skip_blogger == 'true')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_KEYWORDS: ${{ inputs.max_keywords || '5' }}
        run: |
          echo "🔍 Enriching missing keywords with AI metadata (max: ${MAX_KEYWORDS})..."
          npm run enrich-missing || echo "⚠️  Enrichment step completed with warnings"

      - name: Upload Enriched Missing Keywords
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: missing-keywords-enriched
          path: missing-keywords-enriched.json
          retention-days: 30

      - name: Create GitHub Issue for Missing Keywords Validation
        if: success() && inputs.dry_run != 'true'
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const enrichedPath = 'missing-keywords-enriched.json';
            const issueBodyPath = 'missing-keywords-issue-body.md';

            if (!fs.existsSync(enrichedPath)) {
              console.log('No missing-keywords-enriched.json found — skipping issue creation.');
              return;
            }

            const enriched = JSON.parse(fs.readFileSync(enrichedPath, 'utf8'));
            if (!enriched || enriched.length === 0) {
              console.log('No missing keywords to validate — skipping issue creation.');
              return;
            }

            const issueBody = fs.existsSync(issueBodyPath)
              ? fs.readFileSync(issueBodyPath, 'utf8')
              : JSON.stringify(enriched, null, 2);

            const movies = [...new Set(enriched.map(e => e.movie))].join(', ');
            const today = new Date().toISOString().slice(0, 10);

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🎵 Missing Lyrics Validation: ${movies} [${today}]`,
              body: issueBody,
              labels: ['missing-lyrics', 'validation-required'],
            });

            console.log(`✅ Created issue #${issue.number}: ${issue.html_url}`);
